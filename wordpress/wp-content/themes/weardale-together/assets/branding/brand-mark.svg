<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <!-- Soft watercolor gradient specifically tuned for the circular brand mark -->
        <radialGradient id="mark-watercolor-grad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
            <stop offset="0%" stop-color="#5F8571" />
            <stop offset="70%" stop-color="#4D7460" />
            <stop offset="100%" stop-color="#3B5C3A" />
        </radialGradient>
    </defs>

    <!-- Beautiful, hand-painted organic circle watercolor background -->
    <path d="M 50,5
             C 74.8,4.3 95.7,25.2 95,50
             C 94.3,74.8 74.8,95.7 50,95
             C 25.2,94.3 4.3,74.8 5,50
             C 5.7,25.2 25.2,5.7 50,5 Z" 
          fill="url(#mark-watercolor-grad)" />

    <!-- Transparent watercolor accent overlay for depth -->
    <path d="M 50,12
             C 70.8,11.3 88.7,29.2 88,50
             C 87.3,70.8 70.8,88.7 50,88
             C 29.2,87.3 11.3,70.8 12,50
             C 12.7,29.2 29.2,12.7 50,12 Z" 
          fill="#3B5C3A" opacity="0.2" />

    <!-- Organic winding river / path through the hills (clean, hand-drawn brush style white stroke) -->
    <path d="M 32,85
             C 32,70 50,65 50,50
             C 50,35 68,30 68,15" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="5.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.9" />
          
    <path d="M 32,85
             C 32,70 50,65 50,50
             C 50,35 68,30 68,15" 
          fill="none" 
          stroke="#F5F0E8" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.4" />
</svg>

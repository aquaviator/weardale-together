<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="100%" preserveAspectRatio="none" role="img" aria-label="Standard landscape photo frame">
  <title>Standard Landscape Frame</title>
  <!-- Outer Warm Cream protective margin (#F5F0E8) -->
  <rect x="0" y="0" width="1200" height="675" fill="none" stroke="#F5F0E8" stroke-width="24" />
  <!-- Primary Deep Forest Green structural border (#3B5C3A) with slight organic rounding -->
  <rect x="16" y="16" width="1168" height="643" rx="12" ry="12" fill="none" stroke="#3B5C3A" stroke-width="8" />
  <!-- Inner Warm Tan accent inset (#C4B89A) -->
  <rect x="28" y="28" width="1144" height="619" rx="8" ry="8" fill="none" stroke="#C4B89A" stroke-width="3" opacity="0.8" />
  
  <!-- Handcrafted corner accent squares -->
  <rect x="20" y="20" width="16" height="16" fill="#3B5C3A" />
  <rect x="1164" y="20" width="16" height="16" fill="#3B5C3A" />
  <rect x="20" y="639" width="16" height="16" fill="#3B5C3A" />
  <rect x="1164" y="639" width="16" height="16" fill="#3B5C3A" />
</svg>

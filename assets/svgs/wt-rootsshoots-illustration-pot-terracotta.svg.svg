<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="100%" height="100%" role="img" aria-label="Roots and Shoots terracotta pot with growing plant">
  <title>Roots & Shoots Terracotta Motif</title>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Soft Terracotta Pot Body (#D4826A) -->
    <path d="M 32,65 L 40,118 Q 60,123 80,118 L 88,65 Z" fill="#D4826A" stroke="#2C2C2A" stroke-width="2.5" />
    <!-- Pot Rim -->
    <rect x="26" y="52" width="68" height="13" rx="4" fill="#D4826A" stroke="#2C2C2A" stroke-width="2.5" />
    <!-- Warm Tan / Shading detail on pot -->
    <path d="M 42,72 Q 60,75 78,72" stroke="#C4B89A" stroke-width="2" opacity="0.6" />
    
    <!-- Growing Botanical Shoots (Above Rim) -->
    <!-- Central Stem -->
    <path d="M 60,52 Q 58,35 60,18" stroke="#3B5C3A" stroke-width="2.5" />
    <!-- Left Sage Green Leaf (#6B8F5E) -->
    <path d="M 59,38 Q 42,35 36,25 Q 46,15 59,30" fill="#6B8F5E" stroke="#2C2C2A" stroke-width="2" />
    <!-- Right Sage Green Leaf -->
    <path d="M 61,44 Q 78,42 84,32 Q 74,20 61,36" fill="#6B8F5E" stroke="#2C2C2A" stroke-width="2" />
    <!-- Top Sprout Leaves -->
    <path d="M 60,20 Q 50,12 52,6 Q 58,10 60,18" fill="#6B8F5E" stroke="#2C2C2A" stroke-width="1.8" />
    <path d="M 60,20 Q 70,12 68,6 Q 62,10 60,18" fill="#6B8F5E" stroke="#2C2C2A" stroke-width="1.8" />
    
    <!-- Gentle decorative pink wash element around plant (#F4D6D2 tint) -->
    <circle cx="60" cy="30" r="22" fill="#D4826A" opacity="0.15" stroke="none" />
  </g>
</svg>

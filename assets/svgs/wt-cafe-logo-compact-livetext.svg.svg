<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" role="img" aria-label="Root and Branch Cafe simplified tree icon">
  <title>Root & Branch Café Compact Mark</title>
  <!-- Warm Tan circular container (#C4956A) -->
  <circle cx="50" cy="50" r="44" fill="#C4956A" opacity="0.15" />
  <circle cx="50" cy="50" r="44" fill="none" stroke="#C4956A" stroke-width="2" stroke-dasharray="6 4" />
  
  <g fill="none" stroke="#3B5C3A" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tree Trunk & Roots -->
    <path d="M 50,78 C 50,68 48,58 50,45" stroke-width="3.5" />
    <!-- Left Root -->
    <path d="M 50,72 Q 40,78 32,82" stroke-width="2.5" />
    <!-- Right Root -->
    <path d="M 50,72 Q 60,78 68,82" stroke-width="2.5" />
    
    <!-- Branches -->
    <path d="M 50,56 Q 36,48 28,40" stroke-width="2.5" />
    <path d="M 50,50 Q 64,42 72,34" stroke-width="2.5" />
    <path d="M 50,44 Q 40,36 34,28" stroke-width="2" />
    
    <!-- Organic Canopy Leaves (Sage Green #6B8F5E & Deep Green #3B5C3A) -->
    <circle cx="28" cy="38" r="7" fill="#6B8F5E" fill-opacity="0.5" stroke="#3B5C3A" stroke-width="1.8" />
    <circle cx="72" cy="34" r="8" fill="#6B8F5E" fill-opacity="0.5" stroke="#3B5C3A" stroke-width="1.8" />
    <circle cx="34" cy="26" r="6" fill="#C4956A" fill-opacity="0.4" stroke="#3B5C3A" stroke-width="1.8" />
    <circle cx="50" cy="24" r="9" fill="#3B5C3A" fill-opacity="0.7" stroke="#3B5C3A" stroke-width="1.8" />
    <circle cx="62" cy="22" r="6" fill="#6B8F5E" fill-opacity="0.5" stroke="#3B5C3A" stroke-width="1.8" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="100%" height="100%" role="img" aria-label="Creative Roots botanical sun and roots illustration">
  <title>Creative Roots Sun and Roots Motif</title>
  <g fill="none" stroke="#2C2C2A" stroke-linecap="round" stroke-linejoin="round">
    <!-- The Sun Motif (Top) -->
    <path d="M 40,35 A 20,20 0 0,1 80,35" stroke-width="2.5" />
    <line x1="60" y1="8" x2="60" y2="2" stroke-width="2" />
    <line x1="38" y1="13" x2="34" y2="8" stroke-width="2" />
    <line x1="82" y1="13" x2="86" y2="8" stroke-width="2" />
    <line x1="23" y1="28" x2="17" y2="25" stroke-width="2" />
    <line x1="97" y1="28" x2="103" y2="25" stroke-width="2" />
    
    <!-- Soil Line (Horizontal Ground) -->
    <path d="M 10,70 Q 30,68 60,70 T 110,69" stroke-width="2" stroke="opacity: 0.8" />
    
    <!-- Growing Sprout / Shoots (Above Ground) -->
    <path d="M 60,70 Q 58,55 60,45" stroke-width="2.5" />
    <path d="M 60,55 Q 48,45 45,52 Q 52,58 60,58" stroke-width="1.8" fill="#E8A020" fill-opacity="0.3" />
    <path d="M 60,48 Q 72,38 75,45 Q 68,51 60,51" stroke-width="1.8" fill="#6B8F5E" fill-opacity="0.3" />
    
    <!-- Root System (Below Ground) -->
    <path d="M 60,70 Q 62,85 58,105 Q 55,118 50,130" stroke-width="2.5" />
    <!-- Left Branching Roots -->
    <path d="M 61,80 Q 45,88 30,95" stroke-width="1.8" />
    <path d="M 42,86 Q 35,98 25,108" stroke-width="1.4" />
    <!-- Right Branching Roots -->
    <path d="M 59,92 Q 75,102 90,110" stroke-width="1.8" />
    <path d="M 72,99 Q 82,112 85,125" stroke-width="1.4" />
  </g>
</svg>

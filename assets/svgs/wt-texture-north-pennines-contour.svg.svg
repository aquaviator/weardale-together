<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="100%" height="100%" preserveAspectRatio="none" role="img" aria-label="North Pennines landscape contour line">
  <title>North Pennines Topography Divider</title>
  <!-- Background subtle Warm Tan dale ridge -->
  <path d="M 0,90 Q 200,30 450,70 T 850,40 T 1200,60 L 1200,120 L 0,120 Z" fill="#C4B89A" opacity="0.25" />
  <!-- Primary Foreground Deep Forest Green mountain & hill contour -->
  <path d="M 0,75 Q 150,20 350,65 T 700,35 T 1000,55 T 1200,25" fill="none" stroke="#3B5C3A" stroke-width="2.5" stroke-linecap="round" opacity="0.65" />
  <!-- Secondary Sage Green lower valley contour -->
  <path d="M 0,95 Q 250,55 500,85 T 950,60 T 1200,80" fill="none" stroke="#6B8F5E" stroke-width="1.5" stroke-linecap="round" opacity="0.45" />
</svg>

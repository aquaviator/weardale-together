<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" role="img" aria-label="Weardale Together annual events framework container">
  <title>Events & Wassail Universal Container</title>
  <!-- Outer permanent WT Deep Forest Green boundary -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#3B5C3A" stroke-width="3" stroke-dasharray="10 5" />
  <!-- Inner Warm Cream canvas area (#F5F0E8) for annual artist artwork -->
  <circle cx="50" cy="50" r="40" fill="#F5F0E8" />
  
  <!-- Subtle North Pennines winter snowflake / apple orchard motif placeholder -->
  <g stroke="#6B8F5E" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="50" y1="22" x2="50" y2="78" />
    <line x1="22" y1="50" x2="78" y2="50" />
    <line x1="30" y1="30" x2="70" y2="70" />
    <line x1="70" y1="30" x2="30" y2="70" />
    <!-- Small decorative apple/berry circles -->
    <circle cx="50" cy="22" r="3" fill="#D4826A" stroke="none" />
    <circle cx="78" cy="50" r="3" fill="#D4826A" stroke="none" />
    <circle cx="50" cy="78" r="3" fill="#D4826A" stroke="none" />
    <circle cx="22" cy="50" r="3" fill="#D4826A" stroke="none" />
  </g>
</svg>

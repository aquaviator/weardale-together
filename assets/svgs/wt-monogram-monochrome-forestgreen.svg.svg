<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" role="img" aria-label="Weardale Together Monogram Mark">
  <title>Weardale Together Monogram</title>
  <!-- Organic, slightly irregular circular watercolour boundary -->
  <path d="M 50,5 C 78,3 96,24 95,52 C 94,79 74,96 47,95 C 21,94 4,75 5,48 C 6,21 23,7 50,5 Z" fill="#3B5C3A" />
  <!-- Inner subtle sage ring for depth -->
  <path d="M 50,9 C 74,7 89,25 88,51 C 87,75 69,89 47,88 C 25,87 11,70 12,48 C 13,25 27,11 50,9 Z" fill="#6B8F5E" opacity="0.3" />
  
  <!-- "W" - Lightweight serif/humanist path (Left side) -->
  <path d="M 22,38 L 28,64 L 34,46 L 40,64 L 46,38" fill="none" stroke="#F5F0E8" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- "T" - Heavier, grounded display path (Right side) -->
  <path d="M 56,38 L 80,38 M 68,38 L 68,64" fill="none" stroke="#F5F0E8" stroke-width="5" stroke-linecap="round" />
</svg>
